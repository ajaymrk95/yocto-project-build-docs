site_name: "Space Linux — Yocto Build Documentation"
site_description: "A guide to building a minimal Linux system image for the NVIDIA Jetson TX2i on NVIDIA Devkit and Connect Tech Elroy carrier board using the Yocto Project."
site_url: https://ajaymrk95.github.io/yocto-project-build-docs/

repo_name: ajaymrk95/yocto-project-build-docs
repo_url: https://github.com/ajaymrk95/yocto-project-build-docs

copyright: "&copy; 2026 Space Linux Build Documentation"

theme:
  name: material
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ajaymrk95/yocto-project-build-docs
  generator: false

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - abbr
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - tables

plugins:
  - search
  - tags

nav:
  - Overview: index.md
  - Roadmap: roadmap.md
  - Phase 1 — Minimal Build:
    - Overview: phase1/index.md
    - What Is Yocto?: phase1/01-what-is-yocto.md
    - Important Links: phase1/02-prerequisite-reading.md
    - Host Setup: phase1/03-host-setup.md
    - Quick Build: phase1/04-quick-build.md
    - Cloning & Branching: phase1/05-cloning-and-branching.md
    - Adding Layers & bblayers.conf: phase1/06-adding-layers.md
    - "Deep Dive: local.conf": phase1/07-local-conf.md
    - Build Process Explained: phase1/08-build-process.md
    - Build Output & Flashing: phase1/09-navigating-output-and-flashing.md
  - Phase 2 — Custom Hardware:
    - Overview: phase2/index.md
    - "Device Trees, DTBs & Configuration": phase2/01-device-trees-and-configuration.md
    - "Custom Machine Setup": phase2/02-custom-machine-setup.md
    - "Executing the Build & Build Problems": phase2/03-executing-the-build.md
    - Build Artifact Modification: phase2/04-build-artifact-modification.md
    - "Setting up NVIDIA Flashing Directory, ConnectTech Utilities, Machine Confs & Flashing": phase2/05-connecttech-flash-scripts.md
  - Phase 3 — PREEMPT_RT: phase3/index.md
